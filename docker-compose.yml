version: "3.9"

services:
  # =========================
  # Frontend (React Vite)
  # =========================
  frontend:
    build: ./presentation/frontend
    container_name: ui
    ports:
      - "8080:8080" 
    depends_on:
      - backend
    networks:
      - app_network

  # =========================
  # Backend (FastAPI)
  # =========================
  backend:
    build: ./main_server
    container_name: backend
    env_file:
      - ./main_server/.env 
    ports:
      - "7000:7000"
    depends_on:
      - db
    networks:
      - app_network

  # =========================
  # AI Agents (Flask)
  # =========================
  # ai_workflow:
  #   build: ./agentapi/ai_workflow
  #   container_name: ai_workflow
  #   ports:
  #     - "8001:8001"
  #   depends_on:
  #     - db
  #   networks:
  #     - app_network

  # gateway:
  #   build: ./agentapi/gateway
  #   container_name: gateway
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - db
  #   networks:
  #     - app_network

  # tips_agent:
  #   build: ./agentapi/tips_agent
  #   container_name: tips_agent
  #   ports:
  #     - "8002:8002"
  #   depends_on:
  #     - db
  #   networks:
  #     - app_network

  # =========================
  # Database (MySQL)
  # =========================
  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: survivorsync
    ports:
      - "33081:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

# =========================
# Volumes
# =========================
volumes:
  db_data:

# =========================
# Networks
# =========================
networks:
  app_network:
    driver: bridge
