version: "3.9"

services:
  # =========================
  # Frontend (React Vite)
  # =========================
  frontend:
    build: ./presentation/frontend
    container_name: ui
    ports:
      - "8080:8080" 
    depends_on:
      - backend
    networks:
      - app_network

  # =========================
  # Backend (FastAPI)
  # =========================
  backend:
    build: ./main_server
    container_name: backend
    env_file:
      - ./main_server/.env 
    ports:
      - "7000:7000"
    depends_on:
      - db
    networks:
      - app_network

  # =========================
  # AI Agents (Flask)
  # =========================
  ai_workflow:
    build: ./agentapi/ai_workflow
    container_name: ai_workflow_service
    env_file:
      - ./agentapi/ai_workflow/.env
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./agentapi/ai_workflow:/app
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./agentapi/gateway
    container_name: gateway_service
    env_file:
      - ./agentapi/gateway/.env
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./agentapi/gateway:/app
    networks:
      - app_network
    depends_on:
      ai_workflow:
        condition: service_healthy
      tips_agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  tips_agent:
    build: ./agentapi/tips_agent
    container_name: tips_agent_service
    env_file:
      - ./agentapi/tips_agent/.env
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./agentapi/tips_agent:/app
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # Database (MySQL)
  # =========================
  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: survivorsync
    ports:
      - "33081:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

# =========================
# Volumes
# =========================
volumes:
  db_data:

# =========================
# Networks
# =========================
networks:
  app_network:
    driver: bridge
