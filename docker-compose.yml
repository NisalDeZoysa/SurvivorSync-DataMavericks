version: "3.9"

services:
  # =========================
  # Frontend (React Vite)
  # =========================
  frontend:
    build: ./presentation/frontend
    container_name: ui
    ports:
      - "3030:3000"   # Vite default dev port
    depends_on:
      - backend
    networks:
      - app_network

  # =========================
  # Backend (FastAPI)
  # =========================
  backend:
    build: ./main_server
    container_name: backend
    ports:
      - "7000:7000"
    environment:
      - DATABASE_HOST=db
      - DATABASE_USER=root
      - DATABASE_PASSWORD=
      - DATABASE_NAME=survivorsync
    depends_on:
      - db
    networks:
      - app_network

  # =========================
  # AI Agents (Flask)
  # =========================
  ai_workflow:
    build: ./agentapi/ai_workflow
    container_name: ai_workflow
    ports:
      - "8001:8001"
    depends_on:
      - db
    networks:
      - app_network

  gateway:
    build: ./agentapi/gateway
    container_name: gateway
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - app_network

  tips_agent:
    build: ./agentapi/tips_agent
    container_name: tips_agent
    ports:
      - "8002:8002"
    depends_on:
      - db
    networks:
      - app_network

  # =========================
  # Database (MySQL)
  # =========================
  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: survivorsync
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

# =========================
# Volumes
# =========================
volumes:
  db_data:

# =========================
# Networks
# =========================
networks:
  app_network:
    driver: bridge
